<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultimate Streaming MP3 Player Dynamic</title>

<style>
:root{
  --bg:#121212;
  --panel:#181818;
  --panel2:#202020;
  --accent:#1db954;
  --text:#ffffff;
}

*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui,Arial}
body{background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;transition:.3s}

/* ===== HEADER ===== */
header{
  background:var(--panel);
  padding:12px;
  display:flex;
  align-items:center;
  justify-content:space-between;
}

#search{
  width:60%;
  padding:10px;
  font-size:16px;
  border-radius:8px;
  border:none;
  background:var(--panel2);
  color:var(--text);
}

#settingsBtn{
  background:var(--panel2);
  border:none;
  padding:8px 12px;
  border-radius:6px;
  cursor:pointer;
  color:var(--text);
}

#settingsMenu{
  position:absolute;
  top:60px;
  right:20px;
  background:var(--panel);
  padding:15px;
  border-radius:10px;
  display:none;
  flex-direction:column;
  gap:10px;
  width:220px;
  box-shadow:0 0 15px rgba(0,0,0,.5);
  z-index:1000;
}

#settingsMenu select,
#settingsMenu input{
  background:var(--panel2);
  color:var(--text);
  border:none;
  padding:6px;
  border-radius:6px;
}

/* ===== MAIN ===== */
#main{flex:1;display:flex;overflow:hidden}
#sidebar{width:220px;background:var(--panel);padding:10px;display:flex;flex-direction:column;gap:10px;transition:.3s}
#content{flex:1;padding:15px;overflow-y:auto;transition:.3s}

.song{padding:8px;border-radius:6px;cursor:pointer;display:flex;justify-content:space-between}
.song:hover{background:var(--panel2)}
.song.active{background:var(--accent)}

/* ===== PLAYER ===== */
#player{background:var(--panel);padding:10px;display:flex;flex-direction:column;gap:6px}
#controls{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
#progress{width:100%}
button{background:var(--panel2);color:var(--text);border:none;padding:6px 10px;border-radius:6px;cursor:pointer}
button:hover{background:var(--accent)}

/* ===== LAYOUTS ===== */
.layout-grid #content{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
.layout-grid .song{flex-direction:column;text-align:center;background:var(--panel2)}

.layout-minimal #sidebar{display:none}

.layout-topbar #main{flex-direction:column}
.layout-topbar #sidebar{width:100%;flex-direction:row;overflow-x:auto}

@media(max-width:700px){#sidebar{display:none}#search{width:75%}}
</style>

</head>
<body>

<header>
<input type="text" id="search" placeholder="Search your music...">
<button id="settingsBtn">⚙ Settings</button>
</header>

<div id="settingsMenu">
<label>Upload Music</label>
<input type="file" id="folderInput" webkitdirectory multiple>

<label>Theme</label> <select id="themeSelect"></select>

<label>Layout</label> <select id="layoutSelect">

<option value="default">Default</option>
<option value="layout-grid">Grid</option>
<option value="layout-minimal">Minimal</option>
<option value="layout-topbar">Topbar</option>
</select>
</div>

<div id="main">
<div id="sidebar">
<button onclick="showLibrary()">Library</button>
<button onclick="showQueue()">Queue</button>
</div>
<div id="content"></div>
</div>

<div id="player">
<div id="nowPlaying">No song playing</div>
<input type="range" id="progress" min="0" max="100" value="0">
<div id="controls">
<button onclick="prevSong()">⏮</button>
<button onclick="togglePlay()">⏯</button>
<button onclick="nextSong()">⏭</button>
<button onclick="toggleShuffle()">🔀</button>
<button onclick="toggleRepeat()">🔁</button>
<input type="range" id="volume" min="0" max="1" step="0.01" value="1">
</div>
</div>

<audio id="audio"></audio>

<script>
let songs=[];
let queue=[];
let currentIndex=0;
let shuffle=false;
let repeat=false;

const audio=document.getElementById("audio");
const content=document.getElementById("content");
const nowPlaying=document.getElementById("nowPlaying");

/* ===== SETTINGS MENU TOGGLE ===== */
const settingsBtn=document.getElementById("settingsBtn");
const settingsMenu=document.getElementById("settingsMenu");
settingsBtn.onclick=()=>{
settingsMenu.style.display=settingsMenu.style.display==="flex"?"none":"flex";
};

/* ===== THEMES ===== */
const themes=[
{name:"Green",bg:"#121212",accent:"#1db954"},
{name:"Blue",bg:"#0f2027",accent:"#2c5364"},
{name:"Purple",bg:"#2c003e",accent:"#9b59b6"},
{name:"Red",bg:"#000000",accent:"#ff0000"}
];

const themeSelect=document.getElementById("themeSelect");
themes.forEach((t,i)=>{
let opt=document.createElement("option");
opt.value=i;
opt.textContent=t.name;
themeSelect.appendChild(opt);
});

function applyTheme(i){
let t=themes[i];
document.documentElement.style.setProperty('--bg',t.bg);
document.documentElement.style.setProperty('--accent',t.accent);
localStorage.setItem("theme",i);
}

themeSelect.onchange=e=>applyTheme(e.target.value);

/* ===== LAYOUT SAVE ===== */
const layoutSelect=document.getElementById("layoutSelect");
layoutSelect.onchange=e=>{
document.body.className="";
if(e.target.value!=="default")document.body.classList.add(e.target.value);
localStorage.setItem("layout",e.target.value);
};

/* ===== RESTORE SETTINGS ===== */
window.onload=()=>{
let savedTheme=localStorage.getItem("theme");
if(savedTheme!==null){themeSelect.value=savedTheme;applyTheme(savedTheme);} 

let savedLayout=localStorage.getItem("layout");
if(savedLayout){layoutSelect.value=savedLayout;if(savedLayout!=="default")document.body.classList.add(savedLayout);} 
};

/* ===== MUSIC UPLOAD ===== */
document.getElementById("folderInput").addEventListener("change",e=>{
songs=[];
for(let file of e.target.files){
if(file.type.startsWith("audio")){
songs.push({name:file.name,url:URL.createObjectURL(file)});
}
}
queue=[...songs];
localStorage.setItem("musicLoaded","true");
showLibrary();
});

/* ===== LIBRARY ===== */
function showLibrary(){
content.innerHTML="";
songs.forEach((song,i)=>{
let div=document.createElement("div");
div.className="song"+(i===currentIndex?" active":"");
div.textContent=song.name;
div.onclick=()=>playSong(i);
content.appendChild(div);
});
}

/* ===== QUEUE ===== */
function showQueue(){
content.innerHTML="";
queue.forEach((song,i)=>{
let div=document.createElement("div");
div.className="song"+(i===currentIndex?" active":"");
div.innerHTML=`${i+1}. ${song.name}`;
div.onclick=()=>playSong(i);
content.appendChild(div);
});
}

function playSong(i){
currentIndex=i;
audio.src=queue[i].url;
audio.play();
nowPlaying.textContent=queue[i].name;
showQueue();
}

function togglePlay(){if(audio.paused)audio.play();else audio.pause();}
function nextSong(){currentIndex=(currentIndex+1)%queue.length;playSong(currentIndex)}
function prevSong(){currentIndex=(currentIndex-1+queue.length)%queue.length;playSong(currentIndex)}
function toggleShuffle(){shuffle=!shuffle}
function toggleRepeat(){repeat=!repeat}

/* ===== PROGRESS ===== */
audio.addEventListener("timeupdate",()=>{
document.getElementById("progress").value=(audio.currentTime/audio.duration)*100||0;
});

document.getElementById("progress").addEventListener("input",e=>{
audio.currentTime=(e.target.value/100)*audio.duration;
});

/* ===== VOLUME ===== */
document.getElementById("volume").oninput=e=>audio.volume=e.target.value;

/* ===== SEARCH DYNAMIC ===== */
document.getElementById("search").oninput=e=>{
let q=e.target.value.toLowerCase();
content.innerHTML="";
queue.filter(s=>s.name.toLowerCase().includes(q)).forEach((song,i)=>{
let div=document.createElement("div");
div.className="song";
div.textContent=song.name;
div.onclick=()=>playSong(i);
content.appendChild(div);
});
};
</script>

</body>
</html>
