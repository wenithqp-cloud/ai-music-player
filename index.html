<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Extreme MP3 Platform</title>

<script src="https://cdn.jsdelivr.net/npm/jsmediatags@3.9.5/dist/jsmediatags.min.js"></script>

<style>
:root{
--bg:#0f0f0f;
--panel:#1b1b1b;
--accent:#ff3c3c;
--text:#ffffff;
--highlight:#ff3c3c;
--shadow:rgba(255,60,60,0.4);
}
body[data-theme="light"]{
--bg:#f4f4f4;
--panel:#ffffff;
--text:#111;
--highlight:#ff3c3c;
--shadow:rgba(255,60,60,0.3);
}
body[data-theme="peach"]{
--bg:#ffe5d9;
--panel:#ffd6c0;
--text:#111;
--highlight:#ff6f61;
--shadow:rgba(255,111,97,0.3);
}
body[data-theme="fruity"]{
--bg:#fff6e5;
--panel:#ffe0b3;
--text:#111;
--highlight:#ff9f1c;
--shadow:rgba(255,159,28,0.3);
}

*{margin:0;padding:0;box-sizing:border-box;transition:all .3s ease}
body{
background:var(--bg);
color:var(--text);
font-family:Segoe UI,sans-serif;
padding:20px;
}

h1{text-align:center;margin-bottom:20px;color:var(--text);transition:all .3s ease}

.panel{
background:var(--panel);
padding:20px;
border-radius:25px;
box-shadow:0 10px 25px var(--shadow);
margin-bottom:20px;
}

button{
background:var(--accent);
border:none;
padding:10px 20px;
border-radius:30px;
color:#fff;
font-weight:bold;
cursor:pointer;
margin:5px;
box-shadow:0 5px 15px var(--shadow);
transition:all .2s ease;
}
button:hover{transform:scale(1.08);box-shadow:0 10px 25px var(--shadow);}

#playlist div{padding:8px;cursor:pointer;border-radius:10px;transition:all .2s ease;}
#playlist div:hover{background:rgba(255,255,255,.1)}

#uploadContainer{display:none;margin-top:10px}
#uploadBar{width:0%;height:15px;background:var(--highlight);border-radius:20px;box-shadow:0 0 10px var(--highlight);transition:.3s}
.progressWrap{background:#444;border-radius:20px;overflow:hidden}

#vinylCanvas{display:block;margin:20px auto;box-shadow:0 0 20px var(--shadow);border-radius:50%;}

#coverArt{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
width:150px;height:150px;border-radius:50%;object-fit:cover;pointer-events:none;
box-shadow:0 10px 25px var(--shadow);transition:transform .3s ease;}
#coverArt:hover{transform:translate(-50%,-50%) scale(1.05);}
.eq input{width:60px;margin-right:5px}
</style>
</head>

<body data-theme="dark">

<h1>Extreme MP3 Platform</h1>

<div class="panel">
<input type="file" id="fileInput" multiple webkitdirectory hidden>
<button onclick="fileInput.click()">Upload Files / Folder</button>
<button onclick="toggleTheme()">Toggle Theme</button>
<button id="saveBtn">Save</button>
<button id="loadBtn">Load</button>
<button onclick="sortPlaylist()">Sort A-Z</button>

<div id="uploadContainer">
<div class="progressWrap"><div id="uploadBar"></div></div>
<p id="uploadText" style="font-size:12px;margin-top:5px;"></p>
</div>
</div>

<div class="panel">
<div style="position:relative;width:300px;height:300px;margin:20px auto;">
<canvas id="vinylCanvas" width="300" height="300"></canvas>
<img id="coverArt" src="default.jpg">
</div>
<h2 id="songTitle">No Song</h2>
<p id="songArtist">Artist</p>
<p id="songAlbum">Album</p>
<audio id="audio" controls style="width:100%"></audio>

<h3 style="margin-top:15px;">Equalizer</h3>
<div class="eq">
<input type="range" min="-15" max="15" value="0" data-band="0">
<input type="range" min="-15" max="15" value="0" data-band="1">
<input type="range" min="-15" max="15" value="0" data-band="2">
<input type="range" min="-15" max="15" value="0" data-band="3">
<input type="range" min="-15" max="15" value="0" data-band="4">
</div>
</div>

<div class="panel" id="playlist"></div>

<script>
const audio=document.getElementById("audio");
const fileInput=document.getElementById("fileInput");
const playlistDiv=document.getElementById("playlist");
const uploadBar=document.getElementById("uploadBar");
const uploadText=document.getElementById("uploadText");
const uploadContainer=document.getElementById("uploadContainer");
const vinylCanvas=document.getElementById("vinylCanvas");
const vctx=vinylCanvas.getContext("2d");
const coverArt=document.getElementById("coverArt");

const SETTINGS_KEY="extremeMP3_settings";
let playlist=[],currentIndex=0;
let waveformData=[],isDragging=false,currentRotation=0;

/* ===== Upload with Loading Bar ===== */
fileInput.addEventListener("change",async e=>{
const files=[...e.target.files].filter(f=>f.type.includes("audio"));
if(!files.length)return;
uploadContainer.style.display="block";
playlist=[];
for(let i=0;i<files.length;i++){
playlist.push(files[i]);
let percent=Math.round((i+1)/files.length*100);
uploadBar.style.width=percent+"%";
uploadText.textContent="Loading "+percent+"%";
await new Promise(r=>setTimeout(r,15));
}
renderPlaylist();
loadSong(0);
setTimeout(()=>uploadContainer.style.display="none",700);
});

/* ===== Playlist ===== */
function renderPlaylist(){
playlistDiv.innerHTML="";
playlist.forEach((file,i)=>{
const div=document.createElement("div");
div.textContent=file.name;
div.onclick=()=>loadSong(i);
playlistDiv.appendChild(div);
});
}
function sortPlaylist(){
playlist.sort((a,b)=>a.name.localeCompare(b.name));
renderPlaylist();
}

/* ===== Audio Engine ===== */
const audioCtx=new AudioContext();
const src=audioCtx.createMediaElementSource(audio);
const analyser=audioCtx.createAnalyser();
const gainNode=audioCtx.createGain();
const panner=audioCtx.createStereoPanner();
const freqs=[60,170,350,1000,3500];
const filters=freqs.map(freq=>{
let f=audioCtx.createBiquadFilter();
f.type="peaking";
f.frequency.value=freq;
f.Q.value=1;
f.gain.value=0;
return f;
});
src.connect(filters[0]);
for(let i=0;i<filters.length-1;i++)filters[i].connect(filters[i+1]);
filters[filters.length-1].connect(panner).connect(gainNode).connect(analyser).connect(audioCtx.destination);

/* Equalizer Controls */
document.querySelectorAll(".eq input")
.forEach(slider=>slider.oninput=e=>{
filters[e.target.dataset.band].gain.value=e.target.value;
});

/* Spatial Auto Pan */
let dir=1;
function autoPan(){panner.pan.value+=0.002*dir;if(panner.pan.value>1||panner.pan.value<-1)dir*=-1;requestAnimationFrame(autoPan);}
autoPan();

/* ===== Save / Load ===== */
function saveSettings(){localStorage.setItem(SETTINGS_KEY,JSON.stringify({theme:document.body.dataset.theme,volume:audio.volume,lastSong:currentIndex}));alert("Saved!");}
function loadSettings(){const s=JSON.parse(localStorage.getItem(SETTINGS_KEY)||"null");if(!s)return;document.body.dataset.theme=s.theme;audio.volume=s.volume;}
saveBtn.onclick=saveSettings;
loadBtn.onclick=loadSettings;
window.onload=loadSettings;

/* ===== Drag & Drop ===== */
document.body.ondragover=e=>e.preventDefault();
document.body.ondrop=e=>{
e.preventDefault();
playlist=[...e.dataTransfer.files].filter(f=>f.type.includes("audio"));
renderPlaylist();
loadSong(0);
};

/* ===== Load Song + Waveform + Metadata + Crossfade ===== */
async function generateWaveform(file){
const arrayBuffer=await file.arrayBuffer();
const audioBuffer=await audioCtx.decodeAudioData(arrayBuffer);
const rawData=audioBuffer.getChannelData(0);
const samples=200;
const blockSize=Math.floor(rawData.length/samples);
waveformData=[];
for(let i=0;i<samples;i++){
let blockStart=blockSize*i,sum=0;
for(let j=0;j<blockSize;j++){sum+=Math.abs(rawData[blockStart+j]);}
waveformData.push(sum/blockSize);
}
}

async function loadSong(index){
if(!playlist[index])return;
currentIndex=index;
const file=playlist[index];
audio.src=URL.createObjectURL(file);
await generateWaveform(file);
readMetadata(file);
audio.play();
let fade=0;
let fadeInterval=setInterval(()=>{fade+=0.05;audio.volume=Math.min(fade,1);if(fade>=1)clearInterval(fadeInterval);},50);
}

/* ===== Metadata ===== */
function readMetadata(file){
coverArt.src="default.jpg";
jsmediatags.read(file,{
onSuccess:tag=>{
const t=tag.tags;
document.getElementById("songTitle").textContent=t.title||file.name;
document.getElementById("songArtist").textContent=t.artist||"Unknown Artist";
document.getElementById("songAlbum").textContent=t.album||"Unknown Album";
if(t.picture){
let base64="";t.picture.data.forEach(b=>base64+=String.fromCharCode(b));
coverArt.src=`data:${t.picture.format};base64,${btoa(base64)}`;
}
},
onError:()=>{}
});
}

/* ===== Theme ===== */
function toggleTheme(){document.body.dataset.theme=document.body.dataset.theme==="dark"?"light":"dark";}

/* ===== Vinyl + Waveform + Neon Glow ===== */
function drawVinyl(){
requestAnimationFrame(drawVinyl);
vctx.clearRect(0,0,300,300);
const center=150,radius=120;
if(!audio.paused && !isDragging)currentRotation+=0.01;
for(let i=0;i<waveformData.length;i++){
let angle=(i/waveformData.length)*Math.PI*2+currentRotation;
let value=waveformData[i]*100;
let x1=center+Math.cos(angle)*radius;
let y1=center+Math.sin(angle)*radius;
let x2=center+Math.cos(angle)*(radius+value);
let y2=center+Math.sin(angle)*(radius+value);
let progressAngle=(audio.currentTime/audio.duration)*Math.PI*2||0;
vctx.strokeStyle=(angle% (Math.PI*2))<progressAngle?"var(--highlight)":"rgba(255,255,255,.2)";
vctx.lineWidth=2;
vctx.shadowBlur=5;
vctx.shadowColor="var(--highlight)";
vctx.beginPath();vctx.moveTo(x1,y1);vctx.lineTo(x2,y2);vctx.stroke();
}}
drawVinyl();
/* Vinyl Drag Scrub */
vinylCanvas.addEventListener("mousedown",()=>isDragging=true);
window.addEventListener("mouseup",()=>isDragging=false);
vinylCanvas.addEventListener("mousemove",e=>{
if(!isDragging || !audio.duration)return;
const rect=vinylCanvas.getBoundingClientRect();
const x=e.clientX-rect.left-150;
const y=e.clientY-rect.top-150;
let angle=Math.atan2(y,x);
if(angle<0)angle+=Math.PI*2;
audio.currentTime=(angle/(Math.PI*2))*audio.duration;
});

/* ===== PWA ===== */
if("serviceWorker"in navigator)navigator.serviceWorker.register("sw.js");
</script>

</body>
</html>
