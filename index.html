<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultimate Streaming MP3 Player</title>

<style>
:root{
  --bg:#121212;
  --panel:#181818;
  --panel2:#202020;
  --accent:#1db954;
  --text:#ffffff;
  --sub:#b3b3b3;
}

*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui,Arial}
body{background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;transition:.3s}

header{
  background:var(--panel);
  padding:12px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
  gap:10px;
}

select,input,button{
  background:var(--panel2);
  color:var(--text);
  border:none;
  padding:6px 10px;
  border-radius:6px;
}
button{cursor:pointer}
button:hover{background:var(--accent)}

#main{flex:1;display:flex;overflow:hidden;transition:.3s}
#sidebar{width:220px;background:var(--panel);padding:15px;display:flex;flex-direction:column;gap:10px;transition:.3s}
#content{flex:1;padding:20px;overflow-y:auto;transition:.3s}

.song{display:flex;justify-content:space-between;padding:10px;border-radius:6px;cursor:pointer;transition:.2s}
.song:hover{background:var(--panel2)}
.song.active{background:var(--accent)}

#player{background:var(--panel);padding:12px;display:flex;flex-direction:column;gap:8px}
#controls{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
#progress{width:100%}

/* ===== Layout Modes ===== */
.layout-topbar #main{flex-direction:column}
.layout-topbar #sidebar{width:100%;flex-direction:row;overflow-x:auto}

.layout-grid #content{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:15px}
.layout-grid .song{background:var(--panel2);flex-direction:column;align-items:center;text-align:center}

.layout-compact .song{padding:6px;font-size:14px}

.layout-minimal #sidebar{display:none}
.layout-minimal header{justify-content:center}

.layout-cards .song{background:var(--panel2);margin-bottom:10px;padding:15px}

@media(max-width:700px){
  #sidebar{display:none}
}
</style>

</head>
<body>

<header>
  <strong>Ultimate Music</strong>
  <input type="file" id="folderInput" webkitdirectory multiple>
  <input type="text" id="search" placeholder="Search...">

  <!-- Theme Dropdown -->

  <select id="themeSelect">
    <option disabled selected>Theme</option>
  </select>

  <!-- Layout Dropdown -->

  <select id="layoutSelect">
    <option disabled selected>Layout</option>
    <option value="default">Default</option>
    <option value="layout-topbar">Top Navigation</option>
    <option value="layout-grid">Grid Library</option>
    <option value="layout-compact">Compact</option>
    <option value="layout-minimal">Minimal</option>
    <option value="layout-cards">Card Style</option>
  </select>
</header>

<div id="main">
  <div id="sidebar">
    <button onclick="showLibrary()">Library</button>
    <button onclick="showQueue()">Queue</button>
  </div>
  <div id="content"></div>
</div>

<div id="player">
  <div id="nowPlaying">No song playing</div>
  <input type="range" id="progress" value="0" min="0" max="100">
  <div id="controls">
    <button onclick="prevSong()">⏮</button>
    <button onclick="togglePlay()">⏯</button>
    <button onclick="nextSong()">⏭</button>
    <button onclick="toggleShuffle()">🔀</button>
    <button onclick="toggleRepeat()">🔁</button>
    <input type="range" id="volume" min="0" max="1" step="0.01" value="1">
  </div>
</div>

<audio id="audio"></audio>

<script>
let songs=[];
let currentIndex=0;
let shuffle=false;
let repeat=false;

const audio=document.getElementById("audio");
const content=document.getElementById("content");
const nowPlaying=document.getElementById("nowPlaying");

// ===== THEMES =====
const themes=[
  {name:"Green",bg:"#121212",accent:"#1db954"},
  {name:"Red",bg:"#000",accent:"#ff0000"},
  {name:"Blue",bg:"#0f2027",accent:"#2c5364"},
  {name:"Purple",bg:"#2c003e",accent:"#9b59b6"},
  {name:"Orange",bg:"#101820",accent:"#f2aa4c"}
];

const themeSelect=document.getElementById("themeSelect");
themes.forEach((t,i)=>{
  let opt=document.createElement("option");
  opt.value=i;
  opt.textContent=t.name;
  themeSelect.appendChild(opt);
});

themeSelect.onchange=()=>{
  let t=themes[themeSelect.value];
  document.documentElement.style.setProperty('--bg',t.bg);
  document.documentElement.style.setProperty('--accent',t.accent);
};

// ===== LAYOUT SWITCHER =====
document.getElementById("layoutSelect").onchange=(e)=>{
  document.body.className="";
  if(e.target.value!=="default"){
    document.body.classList.add(e.target.value);
  }
};

// Upload folder
document.getElementById("folderInput").addEventListener("change",e=>{
  songs=[];
  for(let file of e.target.files){
    if(file.type.startsWith("audio")){
      songs.push({name:file.name,url:URL.createObjectURL(file)});
    }
  }
  showLibrary();
});

function showLibrary(){
  content.innerHTML="";
  songs.forEach((song,i)=>{
    let div=document.createElement("div");
    div.className="song"+(i===currentIndex?" active":"");
    div.textContent=song.name;
    div.onclick=()=>playSong(i);
    content.appendChild(div);
  });
}

function showQueue(){
  content.innerHTML="Queue coming soon";
}

function playSong(i){
  currentIndex=i;
  audio.src=songs[i].url;
  audio.play();
  nowPlaying.textContent=songs[i].name;
  showLibrary();
}

function togglePlay(){if(audio.paused) audio.play(); else audio.pause();}
function nextSong(){currentIndex=(shuffle?Math.floor(Math.random()*songs.length):(currentIndex+1)%songs.length);playSong(currentIndex)}
function prevSong(){currentIndex=(currentIndex-1+songs.length)%songs.length;playSong(currentIndex)}
function toggleShuffle(){shuffle=!shuffle}
function toggleRepeat(){repeat=!repeat}

audio.addEventListener("timeupdate",()=>{
  document.getElementById("progress").value=(audio.currentTime/audio.duration)*100||0;
});

document.getElementById("progress").addEventListener("input",e=>{
  audio.currentTime=(e.target.value/100)*audio.duration;
});

document.getElementById("volume").oninput=e=>{audio.volume=e.target.value};

audio.onended=()=>{if(repeat)playSong(currentIndex);else nextSong()};

// Search
document.getElementById("search").oninput=e=>{
  let q=e.target.value.toLowerCase();
  content.innerHTML="";
  songs.filter(s=>s.name.toLowerCase().includes(q)).forEach((song,i)=>{
    let div=document.createElement("div");
    div.className="song";
    div.textContent=song.name;
    div.onclick=()=>playSong(i);
    content.appendChild(div);
  });
};
</script>

</body>
</html>
