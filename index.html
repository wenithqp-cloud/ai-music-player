<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PlayBar</title>

<script src="https://cdn.jsdelivr.net/npm/jsmediatags@3.9.5/dist/jsmediatags.min.js"></script>

<style>
body{margin:0;font-family:Arial;background:#111;color:white;}
header{background:#1e1e1e;padding:15px;display:flex;align-items:center;}
.menu-btn{font-size:22px;cursor:pointer;}
.dropdown{position:absolute;top:60px;left:10px;background:#222;padding:10px;display:none;border-radius:10px;width:240px;}
.dropdown div{padding:12px;cursor:pointer;border-bottom:1px solid #333;}
.section{display:none;padding:20px;}
.active{display:block;}
.song-item{padding:10px;border-bottom:1px solid #333;cursor:pointer;}
.vinyl{width:230px;height:230px;border-radius:50%;margin:20px auto;animation:spin 6s linear infinite;background-size:cover;background-position:center;background-color:black;}
@keyframes spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
.controls{text-align:center;margin-top:15px;}
.controls button{padding:15px;margin:10px;border-radius:50%;border:none;font-size:20px;cursor:pointer;}
.progress{width:90%;margin:10px auto;}
.meta{text-align:center;margin-top:10px;}
.plus-btn{width:60px;height:60px;font-size:26px;border-radius:50%;margin-top:20px;}
select,input[type=text]{padding:8px;margin:5px 0;width:100%;}
</style>
</head>

<body>

<header>
  <div class="menu-btn" onclick="toggleMenu()">☰</div>
  <h3 style="margin-left:15px;">PlayBar</h3>
</header>

<div class="dropdown" id="menu">
  <div onclick="showSection('files')">1. Files & Folders</div>
  <div onclick="showSection('songs')">2. Songs</div>
  <div onclick="showSection('playlists')">3. Playlists</div>
  <div onclick="showSection('playbar')">4. PlayBar</div>
  <div onclick="showSection('settings')">5. Settings</div>
</div>

<!-- FILES -->
<div class="section" id="files">
  <h2>Upload Files</h2>
  <input type="file" multiple accept="audio/*" onchange="loadFiles(event)">
  <h2>Upload Folder</h2>
  <input type="file" webkitdirectory directory multiple onchange="loadFiles(event)">
</div>

<!-- SONGS -->
<div class="section" id="songs">
  <h2>All Songs</h2>
  <select onchange="sortSongs(this.value)">
    <option value="title">Sort by Title</option>
    <option value="artist">Sort by Artist</option>
    <option value="album">Sort by Album</option>
    <option value="genre">Sort by Genre</option>
  </select>
  <div id="songList"></div>
</div>

<!-- PLAYLISTS -->
<div class="section" id="playlists">
  <h2>Playlists</h2>
  <div id="playlistList"></div>
  <button class="plus-btn" onclick="openPlaylistCreator()">+</button>
</div>

<!-- PLAYBAR -->
<div class="section active" id="playbar">
  <div class="vinyl" id="vinyl"></div>
  <div class="meta">
    <h3 id="title">No Song</h3>
    <p id="artist"></p>
    <p id="album"></p>
  </div>
  <audio id="audio" ontimeupdate="updateProgress()"></audio>
  <input type="range" id="progress" class="progress" min="0" max="100" value="0" onchange="seekSong()">
  <div class="controls">
    <button onclick="prevSong()">⏮</button>
    <button onclick="togglePlay()">⏯</button>
    <button onclick="nextSong()">⏭</button>
  </div>
</div>

<!-- SETTINGS -->
<div class="section" id="settings">
  <h2>Theme</h2>
  <button onclick="setTheme('dark')">Dark</button>
  <button onclick="setTheme('light')">Light</button>
  <button onclick="setTheme('peach')">Peach</button>
  <button onclick="setTheme('fruit')">Fruitier Ergo</button>

  <h2>Data</h2>
  <button onclick="saveData()">Save</button>
  <button onclick="loadData()">Load</button>

  <h3>Info</h3>
  <p>Email: wenithqp@gmail.com</p>
  <p>Version: 0.0.1</p>
</div>

<script>
let songs=[];
let playlists=[];
let currentIndex=0;

window.onload=function(){
  playlists.push({name:"Yeah Bro this All yo Music get a life",songs:[]});
  renderPlaylists();
}

function toggleMenu(){let m=document.getElementById("menu");m.style.display=m.style.display==="block"?"none":"block";}
function showSection(id){document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));document.getElementById(id).classList.add("active");toggleMenu();}

function loadFiles(event){
  for(let file of event.target.files){
    if(file.type.startsWith("audio/")){
      jsmediatags.read(file,{
        onSuccess:tag=>{
          let pic=null;
          if(tag.tags.picture){
            let data=tag.tags.picture.data;
            let format=tag.tags.picture.format;
            let base64="";
            for(let i=0;i<data.length;i++){base64+=String.fromCharCode(data[i]);}
            pic="data:"+format+";base64,"+btoa(base64);
          }
          let song={
            title:tag.tags.title||file.name,
            artist:tag.tags.artist||"Unknown Artist",
            album:tag.tags.album||"Unknown Album",
            genre:tag.tags.genre||"Unknown",
            url:URL.createObjectURL(file),
            cover:pic
          };
          songs.push(song);
          playlists[0].songs.push(song);
          renderSongs();
        }
      });
    }
  }
}

function renderSongs(){
  let list=document.getElementById("songList");
  list.innerHTML="";
  songs.forEach((s,i)=>{
    let div=document.createElement("div");
    div.className="song-item";
    div.innerHTML="<strong>"+s.title+"</strong><br>"+s.artist+" • "+s.album+" • "+s.genre;
    div.onclick=()=>playSong(i);
    list.appendChild(div);
  });
}

function sortSongs(type){
  songs.sort((a,b)=>a[type].localeCompare(b[type]));
  renderSongs();
}

function renderPlaylists(){
  let list=document.getElementById("playlistList");
  list.innerHTML="";
  playlists.forEach(pl=>{
    let div=document.createElement("div");
    div.className="song-item";
    div.innerText=pl.name+" ("+pl.songs.length+")";
    list.appendChild(div);
  });
}

function openPlaylistCreator(){
  let name=prompt("Playlist name:");
  if(!name)return;

  let mode=confirm("Press OK for Auto AI Playlist. Cancel for Manual.");

  if(mode){ // AI Mode
    let vibe=prompt("Enter genre or artist vibe:");
    let newList=songs.filter(s=>s.genre.toLowerCase().includes(vibe.toLowerCase())||s.artist.toLowerCase().includes(vibe.toLowerCase()));
    playlists.push({name:name,songs:newList});
  }else{ // Manual
    let selected=[];
    songs.forEach((s,i)=>{
      if(confirm("Add "+s.title+" ?")) selected.push(s);
    });
    playlists.push({name:name,songs:selected});
  }

  renderPlaylists();
}

function playSong(i){
  currentIndex=i;
  let audio=document.getElementById("audio");
  let vinyl=document.getElementById("vinyl");
  let s=songs[i];
  audio.src=s.url;
  audio.play();
  document.getElementById("title").innerText=s.title;
  document.getElementById("artist").innerText=s.artist;
  document.getElementById("album").innerText=s.album;
  vinyl.style.backgroundImage=s.cover?"url('"+s.cover+"')":"none";
  showSection("playbar");
}

function togglePlay(){let a=document.getElementById("audio");a.paused?a.play():a.pause();}
function nextSong(){if(currentIndex<songs.length-1)playSong(currentIndex+1);}
function prevSong(){if(currentIndex>0)playSong(currentIndex-1);}
function updateProgress(){let a=document.getElementById("audio");if(a.duration)document.getElementById("progress").value=(a.currentTime/a.duration)*100;}
function seekSong(){let a=document.getElementById("audio");let p=document.getElementById("progress");a.currentTime=(p.value/100)*a.duration;}

function setTheme(t){
  if(t==="dark"){document.body.style.background="#111";document.body.style.color="white";}
  if(t==="light"){document.body.style.background="#eee";document.body.style.color="black";}
  if(t==="peach"){document.body.style.background="#ffccaa";document.body.style.color="black";}
  if(t==="fruit"){document.body.style.background="#331133";document.body.style.color="white";}
}

function saveData(){localStorage.setItem("songs",JSON.stringify(songs));localStorage.setItem("playlists",JSON.stringify(playlists));alert("Saved!");}
function loadData(){let s=localStorage.getItem("songs");let p=localStorage.getItem("playlists");if(s)songs=JSON.parse(s);if(p)playlists=JSON.parse(p);renderSongs();renderPlaylists();}
</script>

</body>
</html>
