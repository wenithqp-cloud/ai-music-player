<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini MP3 Viewer</title>
<style>
body { font-family: Arial; background:#121212; color:#fff; text-align:center; padding:30px; }
#dropZone { border: 2px dashed #1db954; padding: 50px; border-radius: 12px; cursor:pointer; margin-bottom:20px; }
audio { width:100%; margin-top:20px; }
</style>
</head>
<body>

<h1>Upload MP3</h1>
<div id="dropZone">Click or drag MP3 here</div>
<input type="file" id="fileInput" accept=".mp3" style="display:none;">
<div id="playerContainer"></div>

<script>
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
const playerContainer = document.getElementById('playerContainer');

dropZone.addEventListener('click', () => fileInput.click());

dropZone.addEventListener('dragover', e => {
  e.preventDefault();
  dropZone.style.background = "#1e1e1e";
});

dropZone.addEventListener('dragleave', e => {
  e.preventDefault();
  dropZone.style.background = "";
});

dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.style.background = "";
  handleFiles(e.dataTransfer.files);
});

fileInput.addEventListener('change', e => handleFiles(e.target.files));

function handleFiles(files) {
  const file = files[0];
  if (!file || !file.name.endsWith('.mp3')) return alert("Only MP3 files allowed");

  const formData = new FormData();
  formData.append('mp3file', file);

  fetch('/upload', { method: 'POST', body: formData })
    .then(res => res.json())
    .then(data => showPlayer(data))
    .catch(err => alert("Upload failed: "+err));
}

function showPlayer(fileData) {
  playerContainer.innerHTML = `
    <h2>${fileData.name}</h2>
    <audio controls autoplay>
      <source src="${fileData.url}" type="audio/mpeg">
      Your browser does not support audio.
    </audio>
  `;
}
</script>

</body>
</html>
