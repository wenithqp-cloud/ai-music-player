<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MP3 Player</title>
<script src="https://cdn.jsdelivr.net/npm/jsmediatags@3.9.5/dist/jsmediatags.min.js"></script>

<style>
:root{
  --bg:#121212;
  --panel:#1e1e1e;
  --panel2:#2a2a2a;
  --accent:#1db954;
  --text:#fff;
}

body{
margin:0;
font-family:system-ui;
background:var(--bg);
color:var(--text);
display:flex;
flex-direction:column;
height:100vh;
}

header{
display:flex;
gap:10px;
padding:10px;
background:var(--panel);
}

#search{
flex:1;
padding:10px;
border:none;
border-radius:8px;
background:var(--panel2);
color:white;
}

#settingsBtn{
padding:8px 14px;
background:var(--panel2);
border:none;
border-radius:8px;
color:white;
}

#main{
flex:1;
display:flex;
overflow:hidden;
}

#sidebar{
width:200px;
background:var(--panel);
padding:10px;
display:flex;
flex-direction:column;
gap:8px;
}

#content{
flex:1;
padding:10px;
overflow-y:auto;
}

.song{
padding:10px;
border-radius:8px;
cursor:pointer;
display:flex;
justify-content:space-between;
}

.song:hover{
background:var(--panel2);
}

.song.active{
background:var(--accent);
}

#player{
background:var(--panel);
padding:10px;
display:flex;
flex-direction:column;
gap:8px;
}

#nowPlaying{
display:flex;
gap:10px;
align-items:center;
}

#albumArt{
width:70px;
height:70px;
background:#333;
border-radius:8px;
background-size:cover;
background-position:center;
}

#trackName{
font-weight:bold;
}

#progress{
width:100%;
}

#controls{
display:flex;
gap:6px;
flex-wrap:wrap;
}

button{
cursor:pointer;
background:var(--panel2);
border:none;
color:white;
border-radius:6px;
padding:6px 10px;
}

button:hover{
background:var(--accent);
}

#settingsOverlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.6);
opacity:0;
pointer-events:none;
transition:.3s;
}

#settingsOverlay.active{
opacity:1;
pointer-events:all;
}

#settingsMenu{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:var(--panel);
padding:20px;
border-radius:12px;
display:flex;
flex-direction:column;
gap:10px;
opacity:0;
pointer-events:none;
transition:.3s;
}

#settingsMenu.active{
opacity:1;
pointer-events:all;
}
</style>
</head>

<body>

<header>
<input id="search" placeholder="Search music">
<button id="settingsBtn">⚙</button>
</header>

<div id="settingsOverlay"></div>

<div id="settingsMenu">

<label>Choose Music Folder</label>
<button onclick="requestMusicFolder()">Select Folder</button>

<input type="file" id="folderInput" webkitdirectory multiple style="display:none">

<label>Playlist Name</label>
<input id="playlistNameInput">

<select id="playlistSelect"></select>

<button onclick="addPlaylist()">Add Playlist</button>
<button onclick="deletePlaylist()">Delete Playlist</button>

</div>

<div id="main">

<div id="sidebar">
<button onclick="showLibrary()">Library</button>
<button onclick="showQueue()">Queue</button>
<button onclick="showPlaylists()">Playlists</button>
</div>

<div id="content"></div>

</div>

<div id="player">

<div id="nowPlaying">
<div id="albumArt"></div>

<div>
<div id="trackName">No song</div>
</div>
</div>

<input type="range" id="progress" min="0" max="100" value="0">

<div id="controls">
<button onclick="prevSong()">⏮</button>
<button onclick="togglePlay()">⏯</button>
<button onclick="nextSong()">⏭</button>
<button onclick="toggleShuffle()">🔀</button>
<button onclick="toggleRepeat()">🔁</button>
<input type="range" id="volume" min="0" max="1" step="0.01" value="1">
</div>

</div>

<audio id="audio"></audio>

<script>

let songs=[]
let queue=[]
let playlists={}
let currentIndex=0
let shuffle=false
let repeat=false

const audio=document.getElementById("audio")
const content=document.getElementById("content")
const trackName=document.getElementById("trackName")
const albumArt=document.getElementById("albumArt")
const progress=document.getElementById("progress")
const volume=document.getElementById("volume")
const playlistSelect=document.getElementById("playlistSelect")

function generateID(){
return "_"+Math.random().toString(36).substr(2,9)
}

function saveState(){
localStorage.setItem("playlists",JSON.stringify(playlists))
}

function loadState(){
let p=localStorage.getItem("playlists")
if(p) playlists=JSON.parse(p)
}

function updatePlaylistSelect(){

playlistSelect.innerHTML=""

Object.keys(playlists).forEach(p=>{

let o=document.createElement("option")
o.value=p
o.textContent=p
playlistSelect.appendChild(o)

})

}

function addPlaylist(){

let name=document.getElementById("playlistNameInput").value.trim()

if(!name || playlists[name]) return

playlists[name]={songs:[]}

updatePlaylistSelect()

saveState()

}

function deletePlaylist(){

let p=playlistSelect.value

if(!p) return

delete playlists[p]

updatePlaylistSelect()

saveState()

}

async function requestMusicFolder(){

try{

if(window.showDirectoryPicker){

const dir=await window.showDirectoryPicker()

for await (const entry of dir.values()){

if(entry.kind==="file" && entry.name.match(/\.(mp3|wav|ogg)$/i)){

const file=await entry.getFile()

addSong(file)

}

}

localStorage.setItem("musicFolderAccess","granted")

}else{

document.getElementById("folderInput").click()

}

}catch(e){
console.log(e)
}

}

document.getElementById("folderInput").addEventListener("change",e=>{

const files=Array.from(e.target.files)

files.forEach(f=>{

if(f.name.match(/\.(mp3|wav|ogg)$/i)){
addSong(f)
}

})

})

function addSong(file){

const id=generateID()

const song={
id:id,
name:file.name,
file:file,
art:""
}

songs.push(song)
queue.push(song)

jsmediatags.read(file,{
onSuccess:tag=>{

if(tag.tags.picture){

let b=""
tag.tags.picture.data.forEach(byte=>b+=String.fromCharCode(byte))

song.art=`data:${tag.tags.picture.format};base64,${btoa(b)}`

}

},
onError:()=>{}
})

renderLibrary()

}

function renderLibrary(){

content.innerHTML=""

songs.forEach((s,i)=>{

const div=document.createElement("div")
div.className="song"
div.textContent=s.name

div.onclick=()=>playSong(i)

content.appendChild(div)

})

}

function playSong(i){

if(!queue[i]) return

currentIndex=i

audio.src=URL.createObjectURL(queue[i].file)

audio.play()

trackName.textContent=queue[i].name

if(queue[i].art){
albumArt.style.backgroundImage=`url('${queue[i].art}')`
}

if('mediaSession' in navigator){

navigator.mediaSession.metadata=new MediaMetadata({
title:queue[i].name,
artist:"Local Music"
})

}

}

function togglePlay(){
audio.paused?audio.play():audio.pause()
}

function nextSong(){

if(queue.length===0) return

currentIndex=shuffle?Math.floor(Math.random()*queue.length):(currentIndex+1)%queue.length

playSong(currentIndex)

}

function prevSong(){

currentIndex=(currentIndex-1+queue.length)%queue.length

playSong(currentIndex)

}

function toggleShuffle(){
shuffle=!shuffle
}

function toggleRepeat(){
repeat=!repeat
}

audio.onended=()=>repeat?playSong(currentIndex):nextSong()

setInterval(()=>{

if(audio.duration){
progress.value=(audio.currentTime/audio.duration)*100
}

},500)

progress.oninput=e=>{
if(audio.duration){
audio.currentTime=(e.target.value/100)*audio.duration
}
}

volume.oninput=e=>{
audio.volume=e.target.value
}

function showLibrary(){
renderLibrary()
}

function showQueue(){

content.innerHTML=""

queue.forEach((s,i)=>{

const d=document.createElement("div")
d.className="song"
d.textContent=s.name
d.onclick=()=>playSong(i)

content.appendChild(d)

})

}

function showPlaylists(){

content.innerHTML=""

Object.keys(playlists).forEach(pl=>{

const div=document.createElement("div")
div.textContent=pl

content.appendChild(div)

})

}

document.getElementById("search").oninput=e=>{

let q=e.target.value.toLowerCase()

content.innerHTML=""

songs.forEach((s,i)=>{

if(s.name.toLowerCase().includes(q)){

const d=document.createElement("div")
d.className="song"
d.textContent=s.name
d.onclick=()=>playSong(i)

content.appendChild(d)

}

})

}

document.getElementById("settingsBtn").onclick=()=>{

document.getElementById("settingsMenu").classList.toggle("active")
document.getElementById("settingsOverlay").classList.toggle("active")

}

document.getElementById("settingsOverlay").onclick=()=>{

document.getElementById("settingsMenu").classList.remove("active")
document.getElementById("settingsOverlay").classList.remove("active")

}

window.onload=()=>{

loadState()

updatePlaylistSelect()

if(!localStorage.getItem("musicFolderAccess")){
setTimeout(requestMusicFolder,800)
}

}

</script>
</body>
</html>
