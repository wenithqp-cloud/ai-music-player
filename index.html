<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultimate Streaming MP3 Player MAX+</title>

<style>
:root{
  --bg:#121212;
  --panel:#181818;
  --panel2:#202020;
  --accent:#1db954;
  --text:#ffffff;
}

*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui,Arial}
body{background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden}

header{background:var(--panel);padding:12px;display:flex;align-items:center;justify-content:space-between}
#search{width:65%;padding:12px;font-size:16px;border-radius:10px;border:none;background:var(--panel2);color:var(--text)}
#settingsBtn{background:var(--panel2);border:none;padding:8px 14px;border-radius:8px;color:var(--text);cursor:pointer}

#mediaStatus{font-size:12px;opacity:.7;margin-left:10px}

#main{flex:1;display:flex;overflow:hidden}
#sidebar{width:220px;background:var(--panel);padding:10px;display:flex;flex-direction:column;gap:10px}
#content{flex:1;padding:15px;overflow-y:auto}

.song{padding:10px;border-radius:8px;cursor:pointer;display:flex;justify-content:space-between}
.song:hover{background:var(--panel2)}
.song.active{background:var(--accent)}

#player{background:var(--panel);padding:10px;display:flex;flex-direction:column;gap:6px}
#controls{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
#progress{width:100%}
button{background:var(--panel2);color:var(--text);border:none;padding:6px 10px;border-radius:6px;cursor:pointer}
button:hover{background:var(--accent)}

</style>

</head>
<body>

<header>
<div style="display:flex;align-items:center;width:100%">
<input type="text" id="search" placeholder="Search your music...">
<span id="mediaStatus"></span>
</div>
<button id="settingsBtn">⚙</button>
</header>

<div id="main">
<div id="sidebar">
<button onclick="showLibrary()">Library</button>
<button onclick="showQueue()">Queue</button>
</div>
<div id="content"></div>
</div>

<div id="player">
<div id="nowPlaying">No song playing</div>
<input type="range" id="progress" min="0" max="100" value="0">
<div id="controls">
<button onclick="prevSong()">⏮</button>
<button onclick="togglePlay()">⏯</button>
<button onclick="nextSong()">⏭</button>
<button onclick="toggleShuffle()">🔀</button>
<button onclick="toggleRepeat()">🔁</button>
<input type="range" id="volume" min="0" max="1" step="0.01" value="1">
</div>
</div>

<audio id="audio"></audio>

<script>
let songs=[];
let queue=[];
let currentIndex=0;
let shuffle=false;
let repeat=false;

const audio=document.getElementById("audio");
const content=document.getElementById("content");
const nowPlaying=document.getElementById("nowPlaying");
const mediaStatus=document.getElementById("mediaStatus");

/* ===== MEDIA CONTROLLER DETECTION ===== */
function detectMediaController(){
let supported=false;

// Media Session API (lock screen / hardware buttons)
if('mediaSession' in navigator){
supported=true;
mediaStatus.textContent="Media Controller: Supported";

navigator.mediaSession.setActionHandler('play',()=>togglePlay());
navigator.mediaSession.setActionHandler('pause',()=>togglePlay());
navigator.mediaSession.setActionHandler('previoustrack',()=>prevSong());
navigator.mediaSession.setActionHandler('nexttrack',()=>nextSong());

}else{
mediaStatus.textContent="Media Controller: Not Supported";
}

// Hardware key fallback
window.addEventListener('keydown',e=>{
if(e.code==='MediaPlayPause'){togglePlay()}
if(e.code==='MediaTrackNext'){nextSong()}
if(e.code==='MediaTrackPrevious'){prevSong()}
});

return supported;
}

detectMediaController();

/* ===== LIBRARY ===== */
function showLibrary(){
content.innerHTML='';
songs.forEach((s,i)=>{
let d=document.createElement('div');
d.className='song';
d.textContent=s.name;
d.onclick=()=>playSong(i);
content.appendChild(d);
});
}

function showQueue(){
content.innerHTML='';
queue.forEach((s,i)=>{
let d=document.createElement('div');
d.className='song'+(i===currentIndex?' active':'');
d.innerHTML=`${i+1}. ${s.name}`;
d.onclick=()=>playSong(i);
content.appendChild(d);
});
}

function playSong(i){
if(!queue[i])return;
currentIndex=i;
audio.src=queue[i].url;
audio.play();
nowPlaying.textContent=queue[i].name;

if('mediaSession' in navigator){
navigator.mediaSession.metadata=new MediaMetadata({
title:queue[i].name,
artist:'Local Library',
album:'Ultimate Player'
});
}

showQueue();
}

function togglePlay(){audio.paused?audio.play():audio.pause()}
function nextSong(){if(queue.length===0)return;currentIndex=(currentIndex+1)%queue.length;playSong(currentIndex)}
function prevSong(){if(queue.length===0)return;currentIndex=(currentIndex-1+queue.length)%queue.length;playSong(currentIndex)}
function toggleShuffle(){shuffle=!shuffle}
function toggleRepeat(){repeat=!repeat}

/* ===== UPLOAD ===== */
document.addEventListener('change',e=>{
if(e.target.type==='file'){
songs=[];
for(let file of e.target.files){
if(file.type.startsWith('audio'))songs.push({name:file.name,url:URL.createObjectURL(file)});
}
queue=[...songs];
showLibrary();
}
});

/* ===== PROGRESS ===== */
audio.addEventListener('timeupdate',()=>{
document.getElementById('progress').value=(audio.currentTime/audio.duration)*100||0;
});
document.getElementById('progress').oninput=e=>audio.currentTime=(e.target.value/100)*audio.duration;
document.getElementById('volume').oninput=e=>audio.volume=e.target.value;

/* ===== SEARCH ===== */
document.getElementById('search').oninput=e=>{
let q=e.target.value.toLowerCase();
content.innerHTML='';
queue.filter(s=>s.name.toLowerCase().includes(q)).forEach((s,i)=>{
let d=document.createElement('div');
d.className='song';
d.textContent=s.name;
d.onclick=()=>playSong(i);
content.appendChild(d);
});
};

</script>

</body>
</html>
