<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Extreme MP3 Player Ultimate</title>
<script src="https://cdn.jsdelivr.net/npm/jsmediatags@3.9.5/dist/jsmediatags.min.js"></script>
<style>
:root {
  --bg: #121212;
  --panel: #1e1e1e;
  --accent: #ff5500;
  --text: #fff;
}

body {
  margin: 0;
  font-family: sans-serif;
  background: var(--bg);
  color: var(--text);
}

header {
  padding: 10px 20px;
  background: var(--panel);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

button {
  background: var(--accent);
  border: none;
  color: white;
  padding: 5px 10px;
  cursor: pointer;
  border-radius: 4px;
}

#settingsBar {
  display: none;
  background: var(--panel);
  padding: 10px;
}

#library {
  padding: 20px;
}

.song-item {
  display: flex;
  justify-content: space-between;
  margin-bottom: 5px;
  background: #222;
  padding: 5px 10px;
  border-radius: 4px;
}

.song-item button {
  margin-left: 10px;
}
</style>
</head>
<body>

<header>
  <h1>Extreme MP3 Player Ultimate</h1>
  <button id="toggleSettings">Settings</button>
</header>

<div id="settingsBar">
  <input type="file" id="songFiles" multiple accept="audio/*">
  <button id="addSongs">Add Songs</button>
</div>

<section id="library">
  <h2>Library</h2>
  <div id="songList"></div>
</section>

<audio id="player" controls style="width:100%; margin-top:20px;"></audio>

<script>
const toggleSettingsBtn = document.getElementById('toggleSettings');
const settingsBar = document.getElementById('settingsBar');
const songFilesInput = document.getElementById('songFiles');
const addSongsBtn = document.getElementById('addSongs');
const songList = document.getElementById('songList');
const player = document.getElementById('player');

let library = [];

toggleSettingsBtn.addEventListener('click', () => {
  settingsBar.style.display = settingsBar.style.display === 'none' ? 'block' : 'none';
});

addSongsBtn.addEventListener('click', () => {
  const files = Array.from(songFilesInput.files);
  files.forEach(file => {
    const url = URL.createObjectURL(file);
    library.push({ name: file.name, url });
  });
  renderLibrary();
  songFilesInput.value = ''; // clear input
});

function renderLibrary() {
  songList.innerHTML = '';
  library.forEach((song, index) => {
    const songDiv = document.createElement('div');
    songDiv.className = 'song-item';
    songDiv.innerHTML = `
      <span>${song.name}</span>
      <div>
        <button onclick="playSong(${index})">Play</button>
      </div>
    `;
    songList.appendChild(songDiv);
  });
}

function playSong(index) {
  player.src = library[index].url;
  player.play();
}
</script>

</body>
</html>
